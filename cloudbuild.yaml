options:
  logging: CLOUD_LOGGING_ONLY

steps:
  # 1) Construir la imagen en el repositorio correcto
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - "-t"
      - "europe-west1-docker.pkg.dev/subida-fotos-drive/cloud-run-source-deploy/advanced-quote:latest"
      - "."

  # 2) Push a Artifact Registry
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - "europe-west1-docker.pkg.dev/subida-fotos-drive/cloud-run-source-deploy/advanced-quote:latest"

  # 3) Deploy a Cloud Run (Servicio nuevo: advanced-quote-app)
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - advanced-quote-app
      - "--image=europe-west1-docker.pkg.dev/subida-fotos-drive/cloud-run-source-deploy/advanced-quote:latest"
      - "--region=europe-west1"
      - "--platform=managed"
      - "--allow-unauthenticated"

images:
  - "europe-west1-docker.pkg.dev/subida-fotos-drive/cloud-run-source-deploy/advanced-quote:latest"
